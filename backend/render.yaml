services:
  - type: web
    name: lung-cancer-detection
    runtime: python
    rootDir: backend/proj1
    buildCommand: |
      pip install -r requirements.txt
      cd ../../frontend
      yarn install
      yarn build
      cd ../backend/proj1
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn proj1.wsgi:application
