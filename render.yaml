services:
  - type: web
    name: lung-cancer-detection
    runtime: python
    rootDir: backend/proj1
    buildCommand: |
      cd ../../frontend && npm install && npm run build
      cd ../backend/proj1
      pip install -r requirements.txt
      pip install tensorflow-cpu tf2onnx
      python accounts/convert_model.py
      pip uninstall -y tensorflow-cpu tf2onnx keras
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn proj1.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: CI
        value: "false"
